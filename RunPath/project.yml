name: RunPath
options:
  bundleIdPrefix: com.runpath
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  RunPath:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/RunPath
        excludes:
          - "**/.DS_Store"
    resources:
      - Sources/RunPath/Assets.xcassets
      - Sources/RunPath/Info.plist
    info:
      path: Sources/RunPath/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runpath.app
        PRODUCT_NAME: RunPath
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        INFOPLIST_FILE: Sources/RunPath/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_BITCODE: NO
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule
